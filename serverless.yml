service: melina-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: ${env:APP_REGION, 'us-east-1'}
  stage: ${opt:stage, 'prod'}
  environment:
    DB_HOST: ${env:DB_HOST}
    DB_PORT: ${env:DB_PORT, '5432'}
    DB_NAME: ${env:DB_NAME, 'melina'}
    DB_USER: ${env:DB_USER}
    DB_PASSWORD: ${env:DB_PASSWORD}
    DB_SSL: ${env:DB_SSL, 'true'}
    JWT_SECRET: ${env:JWT_SECRET}
    APP_REGION: ${env:APP_REGION, 'us-east-1'}
    FRONTEND_URL: ${env:FRONTEND_URL, '*'}
    S3_DOCUMENTS_BUCKET: ${env:S3_DOCUMENTS_BUCKET, 'acres-documents'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource:
            - arn:aws:s3:::${env:S3_DOCUMENTS_BUCKET, 'acres-documents'}
            - arn:aws:s3:::${env:S3_DOCUMENTS_BUCKET, 'acres-documents'}/*

package:
  patterns:
    - '!node_modules/**'
    - '!src/**'
    - '!public/**'
    - '!build/**'
    - '!database/**'
    - '!.env*'
    - 'server/**'

functions:
  api:
    handler: server/lambda.handler
    timeout: 29
    events:
      - http:
          path: /{proxy+}
          method: ANY
          cors:
            origin: ${env:FRONTEND_URL, '*'}
            headers:
              - Content-Type
              - Authorization
            allowCredentials: false
      - http:
          path: /
          method: ANY
          cors: true

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 4000
